services:
  # FRONTEND - React built and served by nginx
  frontend:
    build: ./frontend
    ports:
      - "3000:8080"
    networks:
      - frontend
    depends_on:
      - backend
    restart: unless-stopped

  # BACKEND - Node/Express API
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=3tier_db
      - PORT=5000
    networks:
      - frontend
      - backend
    depends_on:
      - db
    restart: unless-stopped

  # DATABASE - PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=3tier_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend
    restart: unless-stopped

volumes:
  pgdata:

networks:
  frontend:
  backend:
