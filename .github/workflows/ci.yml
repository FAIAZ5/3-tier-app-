name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t 3tier-backend ./backend

      - name: Build frontend image
        run: docker build -t 3tier-frontend ./frontend
